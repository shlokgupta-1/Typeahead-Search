version: "3.9"

services:
  db:
    image: postgres:16
    container_name: typeahead-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: typeahead
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - typeahead-network

  cache:
    image: redis:7-alpine
    container_name: typeahead-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - typeahead-network

  server:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: typeahead-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/typeahead
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: cache
      SPRING_DATA_REDIS_PORT: 6379
    ports:
      - "8080:8080"
    networks:
      - typeahead-network

  client:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: typeahead-frontend
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"
    networks:
      - typeahead-network

volumes:
  postgres_data:

networks:
  typeahead-network:
    driver: bridge